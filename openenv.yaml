spec_version: 1
name: ai_bloat_detector
description: >
  An RL environment where an agent inspects developer workspace files and
  decides whether to delete (AI-generated bloat), flag (uncertain), or
  skip (human-authored). Rewards correct triage decisions.
version: "1.0.0"
author: DaddyCoder70
type: space
runtime: fastapi
app: server/app.py:app
port: 8000

observation_space:
  type: structured
  description: >
    FileFingerprint with path, size, ai_probability, and forensic signals.

action_space:
  type: discrete
  actions:
    - delete
    - flag
    - skip
  description: >
    delete removes AI bloat, flag marks uncertain files, skip preserves human files.

endpoints:
  health: /
  reset: /reset
  step: /step
  state: /state

tasks:
  - id: precision
    description: >
      Minimize false positives: delete only high-confidence AI bloat,
      never delete human files.
    grader: grader_precision

  - id: recall
    description: >
      Minimize false negatives: catch every AI bloat artifact,
      never miss obvious bloat.
    grader: grader_recall

  - id: f1_score
    description: >
      Balance precision and recall for robust overall triage quality.
    grader: grader_f1_score

  - id: efficiency
    description: >
      Maximize bytes freed per step by targeting large high-confidence bloat first.
    grader: grader_efficiency

scoring:
  reward_range: [0.0, 1.0]
  success_threshold: 0.5
  score_constraints:
    open_interval: true
    min_exclusive: 0.0
    max_exclusive: 1.0
  score_formula: mean(task_scores)

constraints:
  max_runtime_seconds: 1200
  max_memory_gb: 8
  max_vcpu: 2
