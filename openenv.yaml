spec_version: 1
name: ai_bloat_detector
description: >
  An OpenEnv-compliant environment for AI bloat-ware detection in developer
  workspaces. The agent receives structured file forensics (metadata,
  content-type checks, AI signals, and ai_probability) and must decide
  whether to delete, flag, or skip each item.
version: "1.0.0"
author: DaddyCoder70
type: space
runtime: fastapi
app: server/app.py:app
port: 8000

observation_space:
  type: structured
  description: >
    FileFingerprint observation with path, file metadata, AI forensic signals,
    and ai_probability score.

action_space:
  type: discrete
  actions:
    - delete
    - flag
    - skip
  description: >
    delete removes likely AI-generated bloat, flag marks uncertain files for
    review, and skip preserves likely human-authored files.

endpoints:
  health: /
  reset: /reset
  step: /step
  state: /state

tasks:
  - id: precision
    description: >
      Minimize false positives by deleting only highly confident bloat files.
      Correct behavior: avoid deleting human files.
    grader: grader_precision

  - id: recall
    description: >
      Minimize false negatives by catching all true bloat files.
      Correct behavior: avoid missing bloat artifacts.
    grader: grader_recall

  - id: f1_score
    description: >
      Balance precision and recall for robust overall triage quality.
      Correct behavior: maintain both low false positives and low false negatives.
    grader: grader_f1_score

  - id: efficiency
    description: >
      Maximize bytes freed per decision under a constrained action budget.
      Correct behavior: prioritize large high-confidence bloat first.
    grader: grader_efficiency

scoring:
  reward_range: [0.0, 1.0]
  success_threshold: 0.5
  score_constraints:
    open_interval: true
    min_exclusive: 0.0
    max_exclusive: 1.0
  score_formula: mean(task_scores)

constraints:
  max_runtime_seconds: 1200
  max_memory_gb: 8
  max_vcpu: 2